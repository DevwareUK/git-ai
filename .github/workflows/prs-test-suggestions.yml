# Generated by prs setup
# Requires repository secret OPENAI_API_KEY. Optional repository variables: GIT_AI_OPENAI_MODEL, GIT_AI_OPENAI_BASE_URL.

name: Git AI Test Suggestions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  test-suggestions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          DIFF_FILE="$RUNNER_TEMP/prs-test-suggestions.diff"
          git diff --unified=3 "$BASE_SHA" "$HEAD_SHA" > "$DIFF_FILE"
          echo "diff_file=$DIFF_FILE" >> "$GITHUB_OUTPUT"
          if [ -s "$DIFF_FILE" ]; then
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect resolved test suggestions
        id: resolved_suggestions
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- prs:test-suggestions -->";
            const resolvedStart = "<!-- prs:test-suggestions:resolved-start -->";
            const resolvedEnd = "<!-- prs:test-suggestions:resolved-end -->";
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) => {
              const body = comment.body ?? "";
              return body.includes(marker) && comment.user?.type === "Bot";
            });
            const body = existingComment?.body ?? "";
            const startIndex = body.indexOf(resolvedStart);
            const endIndex = body.indexOf(resolvedEnd);
            const hasResolvedBlock = startIndex >= 0 && endIndex > startIndex;
            const resolvedJson = hasResolvedBlock
              ? body.slice(startIndex + resolvedStart.length, endIndex).trim()
              : "[]";

            let records = [];
            try {
              const parsed = JSON.parse(resolvedJson);
              records = Array.isArray(parsed) ? parsed : [];
            } catch {
              records = [];
            }

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner,
                repo,
                pull_number: issue_number,
                per_page: 100,
              }
            );
            const activeCommitShas = new Set(
              commits.map((commit) => commit.sha).filter(Boolean)
            );
            const activeRecords = records.filter(
              (record) =>
                record &&
                typeof record === "object" &&
                typeof record.commitSha === "string" &&
                activeCommitShas.has(record.commitSha)
            );
            const resolvedBlock = activeRecords.length > 0
              ? `${resolvedStart}\n${JSON.stringify(activeRecords, null, 2)}\n${resolvedEnd}`
              : "";

            core.setOutput("resolved_json", JSON.stringify(activeRecords));
            core.setOutput("resolved_block", resolvedBlock);

      - name: Generate test suggestions
        id: test_suggestions
        if: ${{ steps.diff.outputs.has_diff == 'true' }}
        uses: DevwareUK/prs/actions/test-suggestions@main
        with:
          diff_file: ${{ steps.diff.outputs.diff_file }}
          pr_title: ${{ github.event.pull_request.title }}
          pr_body: ${{ github.event.pull_request.body }}
          resolved_suggestions: ${{ steps.resolved_suggestions.outputs.resolved_json }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          openai_model: ${{ vars.GIT_AI_OPENAI_MODEL }}
          openai_base_url: ${{ vars.GIT_AI_OPENAI_BASE_URL }}

      - name: Create or update managed PR comment
        if: ${{ steps.test_suggestions.outputs.body != '' }}
        uses: actions/github-script@v7
        env:
          TEST_SUGGESTIONS_BODY: ${{ steps.test_suggestions.outputs.body }}
          RESOLVED_BLOCK: ${{ steps.resolved_suggestions.outputs.resolved_block }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- prs:test-suggestions -->";
            const managedBody = [
              marker,
              process.env.RESOLVED_BLOCK,
              process.env.TEST_SUGGESTIONS_BODY,
            ].filter(Boolean).join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) => {
              const body = comment.body ?? "";
              return body.includes(marker) && comment.user?.type === "Bot";
            });

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: managedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: managedBody,
              });
            }
