name: PR Description

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Debug tool versions
        run: |
          echo "pnpm: $(pnpm -v)"
          echo "node: $(node -v)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Debug repo config
        run: |
          echo "--- pwd ---"
          pwd
          echo "--- ls -la ---"
          ls -la
          echo "--- .npmrc ---"
          cat .npmrc || true
          echo "--- pnpm-lock.yaml (top 20 lines) ---"
          sed -n '1,20p' pnpm-lock.yaml || true
          echo "--- pnpm config list ---"
          pnpm config list

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build workspace
        run: pnpm build

      - name: Generate PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'diff<<EOF'
            git diff --unified=3 "$BASE_SHA...$HEAD_SHA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR description
        id: pr_description
        uses: ./actions/pr-description
        with:
          diff: ${{ steps.diff.outputs.diff }}
          issue_title: ${{ github.event.pull_request.title }}
          issue_body: ${{ github.event.pull_request.body }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Update PR body
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.pr_description.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: process.env.BODY,
            });
